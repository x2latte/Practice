stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

cache:
  paths:
    - .cache/pip
    - venv/

# ── Lint ─────────────────────────────────────────────────────────────
ruff:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check app/

# ── Tests ────────────────────────────────────────────────────────────
pytest:
  stage: test
  image: python:3.11-slim
  services:
    - postgres:16-alpine
  variables:
    POSTGRES_USER:     tzuser
    POSTGRES_PASSWORD: tzpass
    POSTGRES_DB:       tz_db
    DATABASE_URL: postgresql+asyncpg://tzuser:tzpass@postgres/tz_db
    SECRET_KEY: ci_test_secret_key_at_least_32_chars_ok
  script:
    - apt-get update && apt-get install -y libpq-dev gcc
    - pip install -r requirements.txt
    - alembic upgrade head
    - pytest -v

# ── Build Docker image ───────────────────────────────────────────────
docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"
  only:
    - main
    - develop

# ── Deploy (пример через SSH) ────────────────────────────────────────
deploy-prod:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
  script:
    - ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST"
        "cd /opt/tz_backend &&
         docker pull $DOCKER_IMAGE &&
         docker-compose down &&
         IMAGE=$DOCKER_IMAGE docker-compose up -d"
  environment:
    name: production
  only:
    - main
  when: manual
